<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lock-In | Discipline is the Only Shortcut</title>
    
    <!-- PWA & iOS Optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lock-In">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#000000">
  </head>
  <body>
    <div id="root">
      <style>
        #initial-loader {
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background-color: #000000;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
        }
        @media (prefers-color-scheme: light) {
          #initial-loader { background-color: #F5EBE0; }
          .loader-logo { color: #3A4D1A !important; }
        }
        .loader-logo {
          font-family: system-ui, -apple-system, sans-serif;
          font-size: 2.5rem;
          font-weight: 900;
          font-style: italic;
          text-transform: uppercase;
          color: #F5F5DC;
          letter-spacing: -0.05em;
          animation: pulse-loader 2s infinite ease-in-out;
        }
        @keyframes pulse-loader {
          0%, 100% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.05); opacity: 0.6; }
        }
      </style>
      <div id="initial-loader">
        <div class="loader-logo">LockIn</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
